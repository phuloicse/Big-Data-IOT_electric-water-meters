version: '3.8'

services:
  # 1. KAFKA (Apache Official Image - KRaft mode)
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka-server
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - bigdata-net

  # 2. KAFKA UI (Giao diện quản lý Kafka) - [THÊM MỚI]
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8082:8080" # Truy cập UI tại http://localhost:8082
    environment:
      - KAFKA_CLUSTERS_0_NAME=BigData-Cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092 # Trỏ vào luồng nội bộ của Kafka
    depends_on:
      - kafka # Chờ Kafka chạy trước
    networks:
      - bigdata-net

  # 3. SPARK MASTER
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080" # Web UI của Spark Master
      - "7077:7077"
      - "4040:4040"
    volumes:
      - ./spark-code:/opt/spark-code
    networks:
      - bigdata-net

  # 4. SPARK WORKER
  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    ports:
      - "8081:8081" # Web UI của Spark Worker
    volumes:
      - ./spark-code:/opt/spark-code
    depends_on:
      - spark-master # Chờ Spark Master chạy trước mới kết nối vào
    networks:
      - bigdata-net

  # 5. ELASTICSEARCH
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - bigdata-net

  # 6. KIBANA
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.3
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch # Chờ Elasticsearch chạy trước
    volumes:
      - kibana_data:/usr/share/kibana/data
    networks:
      - bigdata-net

  # 7. MINIO
  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - bigdata-net

volumes:
  kafka_data:
  es_data:
  kibana_data:
  minio_data:

networks:
  bigdata-net:
    driver: bridge